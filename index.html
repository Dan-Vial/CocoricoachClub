  <!-- OneSignal SDK v16 -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script type="module">
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      const oneSignalAppId = "%VITE_ONE_SIGNAL_APP_ID%";
      const hasValidAppId =
        !!oneSignalAppId && !oneSignalAppId.includes("VITE_ONE_SIGNAL_APP_ID");

      if (!hasValidAppId) {
        console.warn("[OneSignal] Missing App ID — SDK initialization skipped");
        return;
      }

      try {
        await OneSignal.init({
          appId: oneSignalAppId,
          serviceWorkerParam: { scope: "/push/onesignal/" },
          serviceWorkerPath: "push/onesignal/OneSignalSDKWorker.js",
          notifyButton: { enable: false },
          promptOptions: { slidedown: { enabled: false } },
          autoRegister: false,
          autoResubscribe: true,

          // Config develop-local
          ...(import.meta.env.DEV && {
            allowLocalhostAsSecureOrigin: true,
          }),
        });
        window.OneSignal = OneSignal;
        console.log("[OneSignal] SDK v16 initialized");
      } catch (error) {
        console.warn("[OneSignal] SDK initialization failed, continuing without push", error);
      }
    });
  </script>
</head>

<body>
